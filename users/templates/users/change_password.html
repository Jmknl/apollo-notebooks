{% extends "appliance/base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div
        style="background-color: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; border: 1px solid #eaeaea;">

        <h2 style="color: #3f0755; margin-bottom: 15px;">🔑 Nova Senha</h2>
        <p style="color: #666; margin-bottom: 30px;">Quase lá! Digite sua nova senha de acesso abaixo.</p>

        <form method="post" style="text-align: left;">
            {% csrf_token %}

            <div style="margin-bottom: 25px;">
                {{ form.as_p }}
            </div>

            <button type="submit"
                style="background-color: #3f0755; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                Salvar Nova Senha
            </button>
        </form>

    </div>
</div>

<style>
    form p {
        margin-bottom: 20px;
        color: #444;
        font-weight: bold;
        font-size: 14px;
    }

    form input[type="password"] {
        width: 100%;
        padding: 16px;
        margin-top: 8px;
        border: 2px solid #eaeaea;
        border-radius: 8px;
        background-color: rgba(63, 7, 85, 0.04);
        box-sizing: border-box;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    form input[type="password"]:focus {
        border-color: #3f0755;
        background-color: white;
        outline: none;
        box-shadow: 0 0 8px rgba(63, 7, 85, 0.15);
    }

    form span.helptext {
        font-size: 12px;
        color: #888;
        display: block;
        margin-top: 8px;
        font-weight: normal;
    }

    form ul.errorlist {
        color: #cc0000;
        list-style-type: none;
        padding: 0;
        margin-top: 5px;
        font-size: 13px;
        font-weight: normal;
    }
</style>
{% endblock content %}

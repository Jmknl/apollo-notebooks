{% extends "appliance/base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div
        style="background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center;">

        <h2 style="color: #28a745; margin-bottom: 15px;">✅ Tudo Certo!</h2>
        <p style="color: #666; margin-bottom: 30px; line-height: 1.5;">
            Sua senha foi redefinida com sucesso. O seu cofre no Apollo Notebooks está seguro com a nova chave.
        </p>

        <a href="{% url 'users:login' %}"
            style="display: block; background-color: #0056b3; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box;">
            Fazer Login Agora
        </a>

    </div>
</div>
{% endblock content %}

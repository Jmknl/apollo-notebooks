{% extends "appliance/base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div
        style="background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center;">

        <h2 style="color: #155724; margin-bottom: 15px;">📬 E-mail Enviado!</h2>
        <div
            style="background-color: #d4edda; color: #155724; padding: 20px; border-radius: 6px; border: 1px solid #c3e6cb; margin-bottom: 25px; line-height: 1.5;">
            Se o e-mail informado estiver em nosso sistema, você receberá um link de recuperação em instantes.
        </div>
        <p style="color: #666; font-size: 14px;">Não esqueça de checar a sua caixa de Spam!</p>

        <a href="{% url 'users:login' %}"
            style="display: inline-block; margin-top: 15px; color: #0056b3; text-decoration: none; font-weight: bold;">
            &larr; Voltar para o Login
        </a>

    </div>
</div>
{% endblock content %}
